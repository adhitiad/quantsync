services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  quantsync-ai-engine:
    build:
      context: .
      dockerfile: quantsync-ai-engine/Dockerfile
    ports:
      - "50051:50051"
      - "8081:8081"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - HEALTH_PORT=8081
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  quantsync-gateway:
    build:
      context: .
      dockerfile: quantsync-gateway/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=${DATABASE_URL}
      - WSS_PORT=8080
      - REDIS_URL=redis://redis:6379
      - AI_ENGINE_ADDR=quantsync-ai-engine:50051
    volumes:
      - ./certs:/app/certs:ro
    depends_on:
      redis:
        condition: service_healthy
      quantsync-ai-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 20s

  quantsync-notifier:
    build:
      context: .
      dockerfile: quantsync-notifier/Dockerfile
    environment:
      - IS_DOCKER=true
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
